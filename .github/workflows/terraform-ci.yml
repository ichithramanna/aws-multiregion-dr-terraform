name: Terraform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Validate & Format
  # Runs on every push and PR
  # No AWS credentials needed
  # ─────────────────────────────────────────────
  validate:
    name: Validate & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  # ─────────────────────────────────────────────
  # JOB 2 — Security Scan with tfsec
  # Scans all .tf files for misconfigurations
  # e.g. unencrypted S3, open security groups,
  # public Aurora, missing logging
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true        #  change to false to enforce

  # ─────────────────────────────────────────────
  # JOB 3 — Terraform Plan + PR Comment
  # Runs plan and posts the output directly
  # as a comment on the pull request
  # Shows exactly what will change in AWS
  # ─────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pull-requests: write
      issues: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init -backend=false -reconfigure -input=false

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_region=us-east-1" \
            -no-color \
            -input=false 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... output truncated ...'
              : plan;
            const output = `#### Terraform Plan 📖
            \`\`\`terraform
            ${truncated}
            \`\`\`
            *Pushed by: @${{ github.actor }} | Workflow: \`${{ github.workflow }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
  # ─────────────────────────────────────────────
  # JOB 4 — Docker Build Check (no push)
  # Verifies the backend Dockerfile builds
  # successfully — catches broken images early
  # Only runs on main branch pushes
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t backend-app:ci-check ./backend
          echo "Docker build successful"